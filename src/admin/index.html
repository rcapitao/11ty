<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <!-- URL totalmente qualificada (com domínio): um caminho absoluto como
         "/rcapitao.com/admin/config.yml" fica sujeito à própria heurística
         de detecção de base path do Sveltia CMS (que duplica o prefixo do
         GitHub Pages de projeto). Só a URL completa evita ambiguidade. -->
    <link href="https://rcapitao.github.io/rcapitao.com/admin/config.yml" type="text/yaml" rel="cms-config-url" />
  </head>
  <body>
    <!-- Script clássico (não "type=module"): o auto-init do Sveltia CMS
         depende de document.currentScript, que o navegador sempre retorna
         null para scripts de módulo — com type="module" o CMS.init() nunca
         é chamado automaticamente e a página fica em branco, sem erro. -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
